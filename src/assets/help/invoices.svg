  <text x="184" y="264" fill="#555" font-size="9" font-weight="600">CLIENT / PRODUCTION COMPANY</text>
  <rect x="184" y="270" width="268" height="28" rx="8" fill="#FAF8F4" stroke="#E5E5E5" stroke-width="1"/>
