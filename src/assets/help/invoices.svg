  <text x="184" y="318" fill="#555" font-size="9" font-weight="600">CLIENT EMAIL</text>
  <rect x="184" y="324" width="268" height="28" rx="8" fill="#FAF8F4" stroke="#E5E5E5" stroke-width="1"/>
