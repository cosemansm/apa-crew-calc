  <text x="582" y="398" fill="#1F1F21" font-size="8" font-weight="500">Day 2 · Tue 07 Apr · Shoot</text>
  <text x="758" y="398" text-anchor="end" fill="#1F1F21" font-size="8" font-weight="600">£910.40</text>
