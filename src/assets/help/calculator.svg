<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="460" fill="#FAF8F4"/>
  <rect width="148" height="460" fill="#1F1F21"/>
  <rect x="16" y="14" width="28" height="28" rx="6" fill="#FFD528"/>
  <text x="30" y="33" text-anchor="middle" fill="#1F1F21" font-size="14">⚓</text>
  <text x="54" y="33" fill="white" font-size="13" font-weight="600">Crew Dock</text>
  <text x="24" y="78" fill="#9A9A9A" font-size="11">Dashboard</text>
  <rect x="10" y="86" width="128" height="30" rx="8" fill="#FFD528"/>
  <text x="24" y="106" fill="#1F1F21" font-size="11" font-weight="600">Calculator</text>
  <text x="24" y="134" fill="#9A9A9A" font-size="11">Jobs</text>
  <text x="24" y="162" fill="#9A9A9A" font-size="11">AI Input</text>
  <text x="24" y="190" fill="#9A9A9A" font-size="11">Invoices</text>
  <text x="24" y="218" fill="#9A9A9A" font-size="11">Support</text>
  <text x="24" y="420" fill="#9A9A9A" font-size="11">Settings</text>
  <!-- Main content -->
  <text x="168" y="36" fill="#1F1F21" font-size="16" font-weight="700">£ Crew Rate Calculator</text>
  <!-- Job name -->
  <text x="168" y="66" fill="#555" font-size="9" font-weight="600">JOB NAME</text>
  <rect x="168" y="72" width="370" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="184" y="91" fill="#C0C0C0" font-size="10">e.g. Nike Summer Campaign</text>
  <!-- Role + Rate row -->
  <text x="168" y="124" fill="#555" font-size="9" font-weight="600">CREW ROLE</text>
  <rect x="168" y="130" width="178" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="184" y="149" fill="#C0C0C0" font-size="10">Select a role...</text>
  <text x="360" y="124" fill="#555" font-size="9" font-weight="600">DAY RATE</text>
  <rect x="360" y="130" width="178" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="376" y="149" fill="#C0C0C0" font-size="10">£ Select role first</text>
  <!-- Date + Day type -->
  <text x="168" y="184" fill="#555" font-size="9" font-weight="600">DATE</text>
  <rect x="168" y="190" width="178" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="184" y="209" fill="#555" font-size="10">24/03/2026</text>
  <text x="360" y="184" fill="#555" font-size="9" font-weight="600">DAY TYPE</text>
  <rect x="360" y="190" width="178" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="376" y="209" fill="#555" font-size="10">Basic Working Day</text>
  <!-- Call / Wrap -->
  <text x="168" y="244" fill="#555" font-size="9" font-weight="600">CALL TIME</text>
  <rect x="168" y="250" width="100" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="218" y="269" text-anchor="middle" fill="#555" font-size="10">08 : 00</text>
  <text x="360" y="244" fill="#555" font-size="9" font-weight="600">WRAP TIME</text>
  <rect x="360" y="250" width="100" height="30" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="410" y="269" text-anchor="middle" fill="#555" font-size="10">19 : 00</text>
  <!-- Breaks section -->
  <text x="168" y="308" fill="#1F1F21" font-size="12" font-weight="600">Breaks &amp; Penalties</text>
  <rect x="168" y="318" width="370" height="50" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="186" cy="343" r="8" fill="#22C55E"/>
  <text x="186" y="347" text-anchor="middle" fill="white" font-size="8">✓</text>
  <text x="202" y="340" fill="#555" font-size="9" font-weight="500">First break given (1 hour)</text>
  <text x="202" y="355" fill="#9A9A9A" font-size="8">Break started at 13:00 · Duration 60 mins</text>
  <!-- Save button -->
  <rect x="168" y="390" width="370" height="36" rx="18" fill="#FFD528"/>
  <text x="353" y="413" text-anchor="middle" fill="#1F1F21" font-size="12" font-weight="600">Save Day</text>
  <!-- Right panel - Cost Breakdown -->
  <rect x="556" y="20" width="228" height="180" rx="12" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="574" y="46" fill="#1F1F21" font-size="13" font-weight="600">Cost Breakdown</text>
  <line x1="556" y1="55" x2="784" y2="55" stroke="#E5E5E5" stroke-width="1"/>
  <text x="574" y="76" fill="#9A9A9A" font-size="9">Basic Day Rate</text>
  <text x="774" y="76" text-anchor="end" fill="#555" font-size="9">£568.00</text>
  <text x="574" y="96" fill="#9A9A9A" font-size="9">Overtime (2h 15m)</text>
  <text x="774" y="96" text-anchor="end" fill="#555" font-size="9">£78.32</text>
  <text x="574" y="116" fill="#9A9A9A" font-size="9">Equipment</text>
  <text x="774" y="116" text-anchor="end" fill="#555" font-size="9">£150.00</text>
  <line x1="574" y1="128" x2="774" y2="128" stroke="#E5E5E5" stroke-width="1"/>
  <text x="574" y="148" fill="#1F1F21" font-size="12" font-weight="700">Day Total</text>
  <text x="774" y="148" text-anchor="end" fill="#1F1F21" font-size="14" font-weight="700">£796.32</text>
  <!-- Job Days mini calendar -->
  <rect x="556" y="214" width="228" height="130" rx="12" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  <text x="574" y="240" fill="#1F1F21" font-size="11" font-weight="600">Job Days</text>
  <text x="574" y="262" fill="#9A9A9A" font-size="9">March 2026</text>
  <text x="574" y="310" fill="#C0C0C0" font-size="9" text-anchor="middle">Save your first day</text>
</svg>
